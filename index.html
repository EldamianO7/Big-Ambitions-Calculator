<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Ambitions — Calculateur de Production</title>

    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --bg-panel: #ffffff;
        --bg-header: #ffffff;
        --border: #e5e5e5;
        --border-focus: #d4d4d4;
        --accent: #171717;
        --accent-hover: #262626;
        --text: #171717;
        --text-dim: #525252;
        --text-dimmer: #a3a3a3;
        --green: #15803d;
        --red: #b91c1c;
        --radius: 4px;
        --radius-sm: 3px;
        --shadow: none;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
      }

      /* HEADER */
      header {
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-header);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-top {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-icon {
        font-size: 18px;
      }
      .logo h1 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.01em;
      }
      .logo span {
        color: var(--text);
      }
      .header-sub {
        font-size: 12px;
        color: var(--text-dim);
        font-family: inherit;
      }

      /* LAYOUT */
      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px;
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 32px;
      }

      /* PANELS */
      .panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .panel-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #fafafa;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }

      /* BUTTONS */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition:
          background 0.15s,
          border-color 0.15s;
        font-family: inherit;
      }
      .btn-primary {
        background: var(--accent);
        color: #ffffff;
        border-color: var(--accent);
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      .btn-ghost {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        background: #fafafa;
      }
      .btn-danger {
        background: transparent;
        color: var(--red);
        border: 1px solid var(--border);
      }
      .btn-danger:hover {
        background: #fef2f2;
        border-color: #fecaca;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }

      /* LINE CARD */
      .lines-list {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .empty-state {
        text-align: center;
        padding: 48px 20px;
        color: var(--text-dim);
      }
      .empty-icon {
        font-size: 24px;
        margin-bottom: 8px;
        opacity: 0.6;
      }
      .recap-empty {
        color: var(--text-dimmer);
        font-size: 13px;
      }

      /* AUTOCOMPLETE DROPDOWN */
      .autocomplete-wrapper {
        position: relative;
        flex: 2;
      }
      .autocomplete-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        max-height: 150px;
        overflow-y: auto;
        z-index: 50;
        display: none;
      }
      .autocomplete-dropdown.open {
        display: block;
      }
      .autocomplete-item {
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .autocomplete-item:hover {
        background: #f5f5f5;
      }

      /* HEADER ACTIONS */
      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .lang-toggle {
        display: flex;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .lang-btn {
        padding: 6px 10px;
        font-size: 12px;
        background: #ffffff;
        border: none;
        cursor: pointer;
        font-family: inherit;
      }
      .lang-btn.active {
        background: var(--accent);
        color: #ffffff;
      }
      .lang-btn:not(.active):hover {
        background: #f5f5f5;
      }
      .line-card {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: border-color 0.15s;
        max-width: 100%;
        overflow: visible;
      }
      .line-card.dragging {
        opacity: 1;
        border-color: var(--text);
        background: #ffffff;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      }
      .lines-list.dragging-active .line-card:not(.dragging) {
        filter: brightness(0.8);
      }
      .line-card:hover {
        border-color: var(--border-focus);
      }
      .line-card.expanded {
        border-color: var(--text);
      }
      .line-card-header {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        min-width: 0;
        width: 100%;
        overflow: hidden;
      }
      .line-card-header > * {
        min-width: 0;
      }
      .drag-handle {
        border: 0;
        background: transparent;
        color: var(--text-dimmer);
        cursor: grab;
        font-size: 14px;
        line-height: 1;
        padding: 2px 4px;
        touch-action: none;
        flex: 0 0 auto;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .line-card-name {
        flex: 1 1 auto;
        width: 0;
        font-size: 14px;
        font-weight: 500;
        min-width: 0;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .line-dirty-tag {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: var(--radius-sm);
        background: #fff7ed;
        color: #c2410c;
        border: 1px solid #fed7aa;
        font-weight: 500;
        flex: 0 0 auto;
      }
      .line-badge {
        font-size: 12px;
        padding: 3px 8px;
        border-radius: var(--radius-sm);
        background: #f5f5f5;
        color: var(--text-dim);
        font-weight: 500;
        flex: 0 0 auto;
      }
      .line-badge.active {
        background: #f0fdf4;
        color: var(--green);
      }
      .chevron {
        color: var(--text-dimmer);
        font-size: 10px;
        flex: 0 0 auto;
      }

      .line-card-body {
        display: none;
        border-top: 1px solid var(--border);
        padding: 20px 16px;
      }
      .line-card.expanded .line-card-body {
        display: block;
      }

      /* FORM ELEMENTS */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 16px;
      }
      .form-group.full {
        grid-column: 1 / -1;
      }
      label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-dim);
        margin-bottom: 6px;
        display: block;
      }
      input[type="text"],
      input[type="number"] {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 8px 10px;
        font-size: 14px;
        width: 100%;
        outline: none;
        font-family: inherit;
      }
      input:focus {
        border-color: var(--text);
      }

      .section-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        margin: 20px 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* RESOURCES */
      .resource-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        padding: 2px 0;
      }
      .resource-row input[type="text"] {
        flex: 2;
        border-bottom: 1px solid var(--border);
        border-top: 0;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        padding: 4px 0;
      }
      .resource-row input[type="number"] {
        width: 70px;
        border-bottom: 1px solid var(--border);
        border-top: 0;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        padding: 4px 0;
        text-align: right;
      }
      .res-sep,
      .res-unit {
        font-size: 12px;
        color: var(--text-dimmer);
      }
      .btn-remove-res {
        background: none;
        border: none;
        color: var(--text-dimmer);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 6px;
      }
      .btn-remove-res:hover {
        color: var(--red);
      }
      .add-res-btn {
        background: none;
        border: 1px dashed var(--border);
        color: var(--text-dim);
        padding: 8px;
        width: 100%;
        cursor: pointer;
        border-radius: var(--radius-sm);
        font-size: 12px;
        margin-top: 4px;
        font-family: inherit;
      }
      .add-res-btn:hover {
        border-color: var(--border-focus);
        color: var(--text);
      }
      .card-actions {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      /* RESULTS */
      .line-results {
        margin-top: 20px;
        background: #fafafa;
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }
      .line-results-title {
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-dim);
        border-bottom: 1px solid var(--border);
      }
      .line-results-body {
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .result-item {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        padding: 4px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .result-block-title {
        font-size: 11px;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-dim);
      }
      .field-warning {
        margin-top: 4px;
        font-size: 11px;
        color: var(--red);
      }

      /* RECAP SIDEBAR */
      .recap-body {
        padding: 16px;
      }
      .sidebar .panel {
        position: sticky;
        top: 98px;
      }
      .mobile-tabs {
        display: none;
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .mobile-tab-btn {
        flex: 1;
        border: 0;
        background: #fff;
        padding: 8px 10px;
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
      }
      .mobile-tab-btn.active {
        background: var(--accent);
        color: #fff;
      }
      .recap-stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
        border-bottom: 1px solid #f5f5f5;
        font-size: 13px;
      }
      .recap-stat-name {
        color: var(--text-dim);
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .recap-stat-val {
        font-weight: 500;
        font-family: inherit;
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }
      .recap-section-sep {
        font-size: 11px;
        font-weight: 500;
        margin: 14px 0 6px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .recap-section-sep::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #ffffff;
        border-radius: var(--radius);
        padding: 24px;
        width: 100%;
        max-width: 380px;
        border: 1px solid var(--border);
      }
      .modal h2 {
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 20px;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--text);
        color: #ffffff;
        padding: 10px 16px;
        border-radius: var(--radius);
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
          padding: 16px 12px;
          gap: 20px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        header {
          padding: 12px 16px;
          flex-wrap: nowrap;
          flex-direction: column;
          align-items: stretch;
          gap: 12px;
          position: sticky;
        }
        .header-top {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
        }
        .header-actions {
          width: 100%;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
          align-items: center;
        }
        .header-actions .btn {
          width: 100%;
          justify-content: center;
        }
        .header-actions .btn-primary {
          grid-column: 1 / -1;
        }
        .header-actions .lang-toggle {
          position: absolute;
          top: 12px;
          right: 16px;
          z-index: 2;
        }
        .header-sub {
          display: none;
        }
        .mobile-tabs {
          display: flex;
        }
        .sidebar .panel {
          position: static;
        }
        .mobile-hidden {
          display: none !important;
        }
        .btn {
          font-size: 12px;
          padding: 6px 10px;
        }
        .btn-sm {
          padding: 5px 8px;
          font-size: 11px;
        }
        .lines-list {
          padding: 12px;
          overflow-x: hidden;
        }
        .line-card-body {
          padding: 16px 12px;
        }
        .line-results-body {
          grid-template-columns: 1fr;
          padding: 12px;
        }
        .resource-row {
          flex-wrap: wrap;
          gap: 6px;
        }
        .autocomplete-wrapper {
          flex: 1 1 100%;
          min-width: 0;
        }
        .resource-row input[type="number"] {
          width: 60px;
        }
        .resource-row input[type="text"] {
          min-width: 0;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .card-actions {
          flex-wrap: wrap;
          gap: 8px;
        }
        .card-actions .btn {
          flex: 1;
          justify-content: center;
        }
        .modal {
          max-width: 90%;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">🏭</div>
          <div>
            <h1>Big <span>Ambitions</span></h1>
            <div class="header-sub" data-i18n="headerSub">
              Calculateur de lignes de production
            </div>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <div class="lang-toggle">
          <button class="lang-btn" id="lang-fr" onclick="setLang('fr')">
            FR
          </button>
          <button class="lang-btn" id="lang-en" onclick="setLang('en')">
            EN
          </button>
        </div>
        <button
          class="btn btn-ghost btn-sm"
          onclick="exportData()"
          data-i18n="export"
        >
          Exporter
        </button>
        <button
          class="btn btn-ghost btn-sm"
          onclick="importData()"
          data-i18n="import"
        >
          Importer
        </button>
        <button
          class="btn btn-primary"
          onclick="openNewLineModal()"
          data-i18n="newLine"
        >
          + Nouvelle ligne
        </button>
      </div>
    </header>
    <input
      type="file"
      id="import-file"
      accept=".json"
      style="display: none"
      onchange="handleImport(event)"
    />

    <div class="app">
      <div class="mobile-tabs">
        <button
          class="mobile-tab-btn active"
          id="tab-lines"
          onclick="setMobileTab('lines')"
          data-i18n="tabLines"
        >
          Lignes
        </button>
        <button
          class="mobile-tab-btn"
          id="tab-recap"
          onclick="setMobileTab('recap')"
          data-i18n="tabRecap"
        >
          Recap
        </button>
      </div>
      <!-- MAIN -->
      <div id="lines-section">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title" data-i18n="productionLines"
              >Lignes de production</span
            >
            <span class="header-sub" id="line-count">0 ligne(s)</span>
          </div>
          <div class="lines-list" id="lines-list">
            <div class="empty-state">
              <div class="empty-icon">📦</div>
              <div>Aucune ligne de production.</div>
              <div style="margin-top: 6px; font-size: 12px">
                Crée ta première ligne pour commencer.
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar" id="recap-section">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title" data-i18n="globalRecap"
              >Recap global / semaine</span
            >
          </div>
          <div id="recap-body" class="recap-body">
            <div class="recap-empty" data-i18n="recapEmpty">
              Les totaux apparaitront ici.
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL Nouvelle ligne -->
    <div class="modal-overlay" id="modal-new">
      <div class="modal">
        <h2 data-i18n="newLineTitle">Nouvelle ligne</h2>
        <div class="form-group">
          <label data-i18n="lineName">Nom de la ligne</label>
          <input
            type="text"
            id="new-line-name"
            maxlength="48"
            data-i18n-placeholder="lineNamePlaceholder"
          />
        </div>
        <div class="form-group" style="margin-top: 12px">
          <label data-i18n="recipe">Recette</label>
          <select
            id="new-line-recipe"
            style="
              width: 100%;
              padding: 8px 10px;
              border: 1px solid var(--border);
              border-radius: var(--radius-sm);
              font-family: inherit;
            "
          ></select>
          <div
            style="margin-top: 6px; font-size: 12px; color: var(--text-dim)"
            data-i18n="recipePrompt"
          >
            Choisis une recette pour pre-remplir la ligne
          </div>
        </div>
        <div
          class="modal-actions"
          style="
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
          "
        >
          <button
            class="btn btn-ghost"
            onclick="closeNewLineModal()"
            data-i18n="cancel"
          >
            Annuler
          </button>
          <button
            class="btn btn-primary"
            onclick="createLine()"
            data-i18n="create"
          >
            Creer
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // ============================================================
      // I18N
      // ============================================================
      const LANG_KEY = "big_ambitions_lang";
      const translations = {
        fr: {
          headerSub: "Calculateur de lignes de production",
          export: "Exporter",
          import: "Importer",
          newLine: "+ Nouvelle ligne",
          productionLines: "Lignes de production",
          lineCount: (n) => `${n} ligne(s)`,
          globalRecap: "Récap global / semaine",
          recapEmpty: "Les totaux apparaitront ici.",
          newLineTitle: "Nouvelle ligne",
          lineName: "Nom de la ligne",
          lineNamePlaceholder: "Ex: Usine de burgers",
          cancel: "Annuler",
          create: "Créer",
          noName: "Sans nom",
          emptyTitle: "Aucune ligne de production.",
          emptyDesc: "Crée ta première ligne pour commencer.",
          daysPerWeek: "Jours de travail / semaine",
          hoursPerWeek: "Heures de travail / semaine",
          surplus: "Surplus souhaité (%)",
          consumedPerHour: "Consommé par heure",
          producedPerHour: "Produit par heure",
          addConsumed: "+ Ajouter une ressource consommée",
          addProduced: "+ Definir la ressource produite",
          changeProduced: "Changer la ressource produite",
          resultsPerWeek: "Résultats par semaine",
          consumedWeek: "Consommé/semaine",
          producedWeek: "Produit/semaine",
          delete: "Supprimer",
          duplicate: "Dupliquer",
          save: "Sauvegarder",

      let currentLang = localStorage.getItem(LANG_KEY) || "en";

      function setLang(lang) {
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        updateLangButtons();
        applyTranslations();
        if (document.getElementById("modal-new")?.classList.contains("open")) {
          populateRecipeOptions();
        }
        renderAll();
      }

      function updateLangButtons() {
        document
          .getElementById("lang-fr")
          .classList.toggle("active", currentLang === "fr");
        document
          .getElementById("lang-en")
          .classList.toggle("active", currentLang === "en");
      }

      function t(key) {
        return translations[currentLang][key] || translations.fr[key] || key;
      }

      function applyTranslations() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          if (translations[currentLang][key]) {
            el.textContent = translations[currentLang][key];
          }
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          const key = el.dataset.i18nPlaceholder;
          if (translations[currentLang][key]) {
            el.placeholder = translations[currentLang][key];
          }
        });
      }

      // ============================================================
      // STORE
      // ============================================================
      const STORAGE_KEY = "big_ambitions_lines_v2";

      function loadLines() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          return [];
        }
      }

      function saveLines(lines) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lines));
      }

      let lines = loadLines();
      let expandedIds = new Set();
      let dirtyIds = new Set();
      const MAX_LINE_NAME_LENGTH = 48;
      const MAX_RESOURCE_NAME_LENGTH = 48;
      let mobileTab = "lines";

      // ============================================================
      // EXPORT / IMPORT
      // ============================================================
      function exportData() {
        const now = new Date();
        const stamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}_${String(now.getHours()).padStart(2, "0")}-${String(now.getMinutes()).padStart(2, "0")}`;
        const data = JSON.stringify(lines, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `big-ambitions-backup-${stamp}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(t("exportSuccess"));
      }

      function importData() {
        document.getElementById("import-file").click();
      }

      function handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
              if (imported.length > 1000) {
                showToast(t("importTooLarge"));
                return;
              }
              lines = imported.map(normalizeLine);
              saveLines(lines);
              expandedIds.clear();
              dirtyIds.clear();
              renderAll();
              showToast(t("importSuccess"));
            } else {
              showToast(t("importError"));
            }
          } catch {
            showToast(t("importError"));
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      // ============================================================
      // RESOURCE AUTOCOMPLETE
      // ============================================================
      let RESOURCE_DB = { consumed: [], produced: [] };
      let RECIPE_DB = [];

      function normalizeLocalizedNames(rawNames) {
        if (rawNames && typeof rawNames === "object") {
          return {
            en: (rawNames.en || "").toString(),
            fr: (rawNames.fr || "").toString(),
          };
        }
        const fallback = (rawNames || "").toString();
        return { en: fallback, fr: fallback };
      }

      function localizeName(names) {
        if (!names) return "";
        return names[currentLang] || names.en || names.fr || "";
      }

      function sanitizeResourceDb(rawDb) {
        const safeDb = rawDb && typeof rawDb === "object" ? rawDb : {};
        const normalizeList = (list, listName, { requireId }) => {
          const cleaned = (Array.isArray(list) ? list : []).filter(
            (item) => item && typeof item === "object" && item.names,
          );
          const usedIds = new Set();
          return cleaned.map((item, index) => {
            const parsedId = parseInt(item.id, 10);
            const hasIdField =
              item.id !== undefined && item.id !== null && item.id !== "";
            if (requireId && !hasIdField) {
              throw new Error(`${listName}[${index}] is missing required id`);
            }
            if (!hasIdField) {
              return {
                id: null,
                names: normalizeLocalizedNames(item.names),
                price:
                  item.price === undefined || item.price === null
                    ? undefined
                    : Math.max(0, parseFloat(item.price) || 0),
                qty: item.qty,
              };
            }
            if (!Number.isFinite(parsedId) || parsedId <= 0) {
              throw new Error(
                `${listName}[${index}] has invalid id: ${item.id}`,
              );
            }
            if (usedIds.has(parsedId)) {
              throw new Error(`${listName} has duplicate id: ${parsedId}`);
            }
            usedIds.add(parsedId);
            if (listName === "produced") {
              if (item.recipe !== undefined || item.recipes !== undefined) {
                throw new Error(
                  `${listName}[${index}]: use top-level "recipes" with producedId, not embedded recipe/recipes`,
                );
              }
            }
            return {
              id: parsedId,
              names: normalizeLocalizedNames(item.names),
              price:
                item.price === undefined || item.price === null
                  ? undefined
                  : Math.max(0, parseFloat(item.price) || 0),
              qty: item.qty,
            };
          });
        };
        return {
          consumed: normalizeList(safeDb.consumed, "consumed", {
            requireId: true,
          }),
          produced: normalizeList(safeDb.produced, "produced", {
            requireId: true,
          }),
        };
      }

      function getConsumedById(id) {
        const parsedId = parseInt(id, 10);
        if (!Number.isFinite(parsedId)) return null;
        return (
          RESOURCE_DB.consumed.find((item) => item.id === parsedId) || null
        );
      }

      function findConsumedPrice(names) {
        const keyEn = (names.en || "").trim().toLowerCase();
        const keyFr = (names.fr || "").trim().toLowerCase();
        const found = RESOURCE_DB.consumed.find((item) => {
          const itemEn = (item.names?.en || "").trim().toLowerCase();
          const itemFr = (item.names?.fr || "").trim().toLowerCase();
          return itemEn === keyEn || itemFr === keyFr;
        });
        return found && found.price !== undefined ? found.price : "";
      }

      function normalizeRecipe(recipe, product) {
        const recipeObj = recipe && typeof recipe === "object" ? recipe : {};
        const producedQty = Math.max(
          0,
          Math.floor(parseFloat(recipeObj.producedQty ?? 1) || 0),
        );
        const consumes = (
          Array.isArray(recipeObj.consumes) ? recipeObj.consumes : []
        )
          .map((r) => {
            let names = normalizeLocalizedNames(r.names || r.name || "");
            let resolvedPrice =
              r.price === undefined || r.price === null || r.price === ""
                ? ""
                : Math.max(0, parseFloat(r.price) || 0);
            if (
              (r.productId !== undefined && r.productId !== null) ||
              !localizeName(names)
            ) {
              const consumedRef = getConsumedById(r.productId);
              if (consumedRef) {
                names = consumedRef.names;
                if (resolvedPrice === "" && consumedRef.price !== undefined) {
                  resolvedPrice = consumedRef.price;
                }
              }
            }
            return {
              names,
              qty: Math.max(0, Math.floor(parseFloat(r.qty) || 0)),
              price:
                resolvedPrice === "" ? findConsumedPrice(names) : resolvedPrice,
            };
          })
          .filter((r) => localizeName(r.names));
        return {
          id: recipeObj.id || uid(),
          produced: { names: product.names, qty: producedQty || 1 },
          consumes,
        };
      }

      function buildRecipeDb(rawDb) {
        const safeDb = rawDb && typeof rawDb === "object" ? rawDb : {};
        const recipes = [];
        if (!Array.isArray(safeDb.recipes)) {
          throw new Error(
            'data.json must include a "recipes" array (top-level)',
          );
        }
        safeDb.recipes.forEach((r, index) => {
          const producedId = parseInt(r?.producedId, 10);
          if (!Number.isFinite(producedId) || producedId <= 0) {
            throw new Error(
              `recipes[${index}] has invalid producedId: ${r?.producedId}`,
            );
          }
          const product =
            RESOURCE_DB.produced.find((p) => p.id === producedId) || null;
          if (!product) {
            throw new Error(
              `recipes[${index}] references unknown producedId: ${producedId}`,
            );
          }
          recipes.push(normalizeRecipe(r, product));
        });

        const unique = new Map();
        recipes.forEach((r) => {
          const key = `${localizeName(r.produced.names).toLowerCase()}::${r.produced.qty}`;
          if (!unique.has(key)) unique.set(key, r);
        });
        return Array.from(unique.values());
      }

      async function loadResourceDb() {
        try {
          const res = await fetch("./data.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const rawDb = await res.json();
          RESOURCE_DB = sanitizeResourceDb(rawDb);
          RECIPE_DB = buildRecipeDb(rawDb);
        } catch (err) {
          console.warn("Failed to load RESOURCE_DB from data.json", err);
          RESOURCE_DB = { consumed: [], produced: [] };
          RECIPE_DB = [];
          showToast(t("resourceDbError"));
        }
      }

      function getAutocompleteResources(type) {
        const dbList =
          type === "consumes" ? RESOURCE_DB.consumed : RESOURCE_DB.produced;
        const map = new Map();
        dbList.forEach((r) => {
          const localized =
            (r.names && r.names[currentLang]) || r.names?.en || "";
          if (!localized) return;
          map.set(localized.toLowerCase(), { name: localized, price: r.price });
        });

        lines.forEach((line) => {
          (line[type] || []).forEach((r) => {
            if (!r.name || !r.name.trim()) return;
            const key = r.name.trim().toLowerCase();
            if (!map.has(key)) {
              map.set(key, {
                name: r.name.trim(),
                price: r.price !== undefined ? parseFloat(r.price) || 0 : 0,
              });
            }
          });
        });

        return Array.from(map.values()).sort((a, b) =>
          a.name.localeCompare(b.name),
        );
      }

      // ============================================================
      // UTILS
      // ============================================================
      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2200);
      }

      function setMobileTab(tab) {
        mobileTab = tab;
        const linesSection = document.getElementById("lines-section");
        const recapSection = document.getElementById("recap-section");
        if (!linesSection || !recapSection) return;
        const isMobile = window.matchMedia("(max-width: 900px)").matches;
        if (!isMobile) {
          linesSection.classList.remove("mobile-hidden");
          recapSection.classList.remove("mobile-hidden");
          return;
        }
        linesSection.classList.toggle("mobile-hidden", tab !== "lines");
        recapSection.classList.toggle("mobile-hidden", tab !== "recap");
        document
          .getElementById("tab-lines")
          .classList.toggle("active", tab === "lines");
        document
          .getElementById("tab-recap")
          .classList.toggle("active", tab === "recap");
      }

      function trimLineName(name) {
        return (name || "").toString().trim().slice(0, MAX_LINE_NAME_LENGTH);
      }

      function trimResourceName(name) {
        return (name || "")
          .toString()
          .trim()
          .slice(0, MAX_RESOURCE_NAME_LENGTH);
      }

      function markLineDirty(id, isDirty = true) {
        if (isDirty) dirtyIds.add(id);
        else dirtyIds.delete(id);
        const card = document.getElementById(`card-${id}`);
        if (!card) return;
        const header = card.querySelector(".line-card-header");
        if (!header) return;
        let tag = header.querySelector(".line-dirty-tag");
        if (isDirty && !tag) {
          const badge = header.querySelector(".line-badge");
          const chevron = header.querySelector(".chevron");
          tag = document.createElement("span");
          tag.className = "line-dirty-tag";
          tag.textContent = t("modified");
          header.insertBefore(tag, badge || chevron);
        }
        if (!isDirty && tag) tag.remove();
      }

      function sanitizeWholeNumberInput(value) {
        if (value === "") return "";
        const n = Math.floor(parseFloat(value));
        if (!Number.isFinite(n) || n < 0) return "0";
        return String(n);
      }

      function calcLine(line) {
        sanitizeLine(line);
        const hoursPerWeek = parseFloat(line.hoursPerWeek) || 0;
        const surplus = parseFloat(line.surplus) || 0;
        const mult = hoursPerWeek * (1 + surplus / 100);

        const consumed = {}; // name -> { display, qty, cost }
        const produced = {};
        let totalCost = 0;
        let totalRevenue = 0;

        (line.consumes || []).forEach((r) => {
          if (r.name && r.qty) {
            const normalizedName = r.name.trim().toLowerCase();
            const displayName = r.name.trim();
            const qtyPerWeek = (parseInt(r.qty) || 0) * mult;
            const price = parseFloat(r.price) || 0;
            const cost = qtyPerWeek * price;

            if (!consumed[normalizedName]) {
              consumed[normalizedName] = {
                display: displayName,
                qty: 0,
                cost: 0,
              };
            }
            consumed[normalizedName].qty += qtyPerWeek;
            consumed[normalizedName].cost += cost;
            totalCost += cost;
          }
        });
        (line.produces || []).forEach((r) => {
          if (r.name && r.qty) {
            const normalizedName = r.name.trim().toLowerCase();
            const displayName = r.name.trim();
            const qtyPerWeek = (parseInt(r.qty) || 0) * hoursPerWeek;
            const price = parseFloat(r.price) || 0;
            const revenue = qtyPerWeek * price;
            if (!produced[normalizedName]) {
              produced[normalizedName] = {
                display: displayName,
                qty: 0,
                revenue: 0,
              };
            }
            produced[normalizedName].qty += qtyPerWeek;
            produced[normalizedName].revenue += revenue;
            totalRevenue += revenue;
          }
        });

        return { consumed, produced, hoursPerWeek, totalCost, totalRevenue };
      }

      // ============================================================
      // RECAP
      // ============================================================
      function updateRecap() {
        const totalConsumed = {};
        const totalProduced = {};
        let grandTotalCost = 0;
        let grandTotalRevenue = 0;

        lines.forEach((line) => {
          const { consumed, produced, totalCost, totalRevenue } =
            calcLine(line);
          grandTotalCost += totalCost;
          grandTotalRevenue += totalRevenue;
          Object.entries(consumed).forEach(([key, data]) => {
            if (!totalConsumed[key]) {
              totalConsumed[key] = { display: data.display, qty: 0, cost: 0 };
            }
            totalConsumed[key].qty += data.qty;
            totalConsumed[key].cost += data.cost;
          });
          Object.entries(produced).forEach(([key, data]) => {
            if (!totalProduced[key]) {
              totalProduced[key] = {
                display: data.display,
                qty: 0,
                revenue: 0,
              };
            }
            totalProduced[key].qty += data.qty;
            totalProduced[key].revenue += data.revenue;
          });
        });

        const container = document.getElementById("recap-body");
        const hasData =
          Object.keys(totalConsumed).length > 0 ||
          Object.keys(totalProduced).length > 0;

        if (!hasData) {
          container.innerHTML = `<div class="recap-empty">${t("recapEmpty")}</div>`;
          return;
        }

        let html = "";

        if (Object.keys(totalConsumed).length > 0) {
          html += `<div class="recap-section-sep consume">${t("consumed")}</div>`;
          Object.entries(totalConsumed)
            .sort((a, b) => a[1].display.localeCompare(b[1].display))
            .forEach(([key, data]) => {
              const costStr =
                data.cost > 0
                  ? ` <span style="color:var(--text-dimmer);font-size:11px">($${fmt(data.cost)})</span>`
                  : "";
              html += `<div class="recap-stat">
        <span class="recap-stat-name">${escHtml(data.display)}</span>
        <span class="recap-stat-val" style="color:var(--red)">${fmt(data.qty)}${costStr}</span>
      </div>`;
            });
        }

        if (Object.keys(totalProduced).length > 0) {
          html += `<div class="recap-section-sep produce" style="margin-top:16px">${t("produced")}</div>`;
          Object.entries(totalProduced)
            .sort((a, b) => a[1].display.localeCompare(b[1].display))
            .forEach(([key, data]) => {
              const revenueStr =
                data.revenue > 0
                  ? ` <span style="color:var(--text-dimmer);font-size:11px">($${fmt(data.revenue)})</span>`
                  : "";
              html += `<div class="recap-stat">
        <span class="recap-stat-name">${escHtml(data.display)}</span>
        <span class="recap-stat-val" style="color:var(--green)">${fmt(data.qty)}${revenueStr}</span>
      </div>`;
            });
        }

        if (grandTotalCost > 0) {
          html += `<div class="recap-section-sep" style="margin-top:16px">${t("totalCost")}</div>`;
          html += `<div class="recap-stat">
        <span class="recap-stat-name">${t("costWeek")}</span>
        <span class="recap-stat-val" style="color:var(--red);font-weight:600">$${fmt(grandTotalCost)}</span>
      </div>`;
        }
        if (grandTotalRevenue > 0) {
          html += `<div class="recap-stat">
        <span class="recap-stat-name">${t("revenueWeek")}</span>
        <span class="recap-stat-val" style="color:var(--green);font-weight:600">$${fmt(grandTotalRevenue)}</span>
      </div>`;
          html += `<div class="recap-stat">
        <span class="recap-stat-name">${t("netWeek")}</span>
        <span class="recap-stat-val" style="font-weight:600;color:${grandTotalRevenue - grandTotalCost >= 0 ? "var(--green)" : "var(--red)"}">$${fmt(grandTotalRevenue - grandTotalCost)}</span>
      </div>`;
        }

        container.innerHTML = html;
      }

      function fmt(n) {
        if (n >= 1000)
          return n.toLocaleString("fr-FR", { maximumFractionDigits: 1 });
        return n % 1 === 0 ? n.toString() : n.toFixed(2);
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ============================================================
      // RENDER
      // ============================================================
      function renderAll() {
        const container = document.getElementById("lines-list");
        document.getElementById("line-count").textContent = t("lineCount")(
          lines.length,
        );

        if (lines.length === 0) {
          container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📦</div>
      <div>${t("emptyTitle")}</div>
      <div style="margin-top:6px;font-size:12px;">${t("emptyDesc")}</div>
    </div>`;
          updateRecap();
          setMobileTab(mobileTab);
          return;
        }

        container.innerHTML = lines
          .map((line) => renderLineCard(line))
          .join("");

        // Rebind events
        lines.forEach((line) => {
          bindLineEvents(line.id);
          updateHoursWarning(line.id);
        });

        updateRecap();
        setMobileTab(mobileTab);
      }

      function renderLineCard(line) {
        const isExpanded = expandedIds.has(line.id);
        const { consumed, produced, hoursPerWeek } = calcLine(line);
        const { totalCost, totalRevenue } = calcLine(line);
        const surplus = parseFloat(line.surplus) || 0;
        const hasProducedResource = (line.produces || []).length > 0;
        const isDirty = dirtyIds.has(line.id);

        let resultsHtml = "";
        if (
          hoursPerWeek > 0 &&
          (Object.keys(consumed).length > 0 || Object.keys(produced).length > 0)
        ) {
          resultsHtml = `<div class="line-results">
      <div class="line-results-title">${t("resultsPerWeek")}</div>
      <div class="line-results-body">
        <div>
          <div class="result-block-title consume">${t("consumedWeek")}</div>
          ${
            Object.keys(consumed).length > 0
              ? Object.entries(consumed)
                  .map(
                    ([key, data]) => `
              <div class="result-item">
                <span class="result-item-name">${escHtml(data.display)}</span>
                <span class="result-item-val consume">${fmt(data.qty)}${surplus > 0 ? `<span class="result-item-surplus">+${surplus}%</span>` : ""}</span>
              </div>`,
                  )
                  .join("")
              : '<div style="font-size:12px;color:var(--text-dimmer)">—</div>'
          }
        </div>
        <div>
          <div class="result-block-title produce">${t("producedWeek")}</div>
          ${
            Object.keys(produced).length > 0
              ? Object.entries(produced)
                  .map(
                    ([key, data]) => `
              <div class="result-item">
                <span class="result-item-name">${escHtml(data.display)}</span>
                <span class="result-item-val produce">${fmt(data.qty)}${data.revenue > 0 ? ` <span style="color:var(--text-dimmer);font-size:11px">($${fmt(data.revenue)})</span>` : ""}</span>
              </div>`,
                  )
                  .join("")
              : '<div style="font-size:12px;color:var(--text-dimmer)">—</div>'
          }
          <div class="result-item" style="margin-top:8px">
            <span class="result-item-name">${t("costWeek")}</span>
            <span class="result-item-val" style="color:var(--red)">-$${fmt(totalCost)}</span>
          </div>
          <div class="result-item">
            <span class="result-item-name">${t("revenueWeek")}</span>
            <span class="result-item-val" style="color:var(--green)">+$${fmt(totalRevenue)}</span>
          </div>
        </div>
      </div>
    </div>`;
        }

        return `
  <div class="line-card ${isExpanded ? "expanded" : ""}" id="card-${line.id}" data-line-id="${line.id}">
    <div class="line-card-header" onclick="toggleCard('${line.id}')">
      <button class="drag-handle" title="${t("dragHint")}" aria-label="${t("dragHint")}" onpointerdown="startLineDrag(event, '${line.id}')">⋮⋮</button>
      <span class="line-card-name">${escHtml(line.name || t("noName"))}</span>
      ${isDirty ? `<span class="line-dirty-tag">${t("modified")}</span>` : ""}
      ${hoursPerWeek > 0 ? `<span class="line-badge active">${fmt(hoursPerWeek)}${t("hoursBadge")}</span>` : ""}
      <span class="chevron">▼</span>
    </div>
    <div class="line-card-body">
      <!-- Nom -->
      <div class="form-row">
        <div class="form-group full">
          <label>${t("lineName")}</label>
          <input type="text" data-field="name" maxlength="${MAX_LINE_NAME_LENGTH}" value="${escHtml(line.name || "")}" placeholder="${t("lineNamePlaceholder")}">
        </div>
      </div>

      <!-- Jours / Heures -->
      <div class="form-row">
        <div class="form-group">
          <label>${t("daysPerWeek")}</label>
          <input type="number" data-field="daysPerWeek" value="${line.daysPerWeek || ""}" min="0" max="7" step="1" placeholder="${t("daysPlaceholder")}">
        </div>
        <div class="form-group">
          <label>${t("hoursPerWeek")}</label>
          <input type="number" data-field="hoursPerWeek" value="${line.hoursPerWeek || ""}" min="0" step="0.5" placeholder="${t("hoursPlaceholder")}">
          <div class="field-warning" id="hours-info-${line.id}"></div>
        </div>
      </div>

      <!-- Surplus -->
      <div class="form-row">
        <div class="form-group">
          <label>${t("surplus")}</label>
          <input type="number" data-field="surplus" value="${line.surplus || ""}" min="0" step="1" placeholder="${t("surplusPlaceholder")}">
        </div>
      </div>

      <!-- Consomme -->
      <div class="section-label">${t("consumedPerHour")}</div>
      <div class="resource-list" id="consumes-${line.id}">
        ${renderResourceRows(line.consumes || [], "consumes", line.id)}
      </div>
      <button class="add-res-btn" onclick="addResource('${line.id}', 'consumes')">${t("addConsumed")}</button>

      <!-- Produit -->
      <div class="section-label">${t("producedPerHour")}</div>
      <div class="resource-list" id="produces-${line.id}">
        ${renderSingleProducedResource(line.produces || [], line.id)}
      </div>
      ${!hasProducedResource ? `<button class="add-res-btn" onclick="addResource('${line.id}', 'produces')">${t("addProduced")}</button>` : ""}

      ${resultsHtml}

      <div class="card-actions">
        <button class="btn btn-danger" onclick="deleteLine('${line.id}')">${t("delete")}</button>
        <button class="btn btn-ghost" onclick="duplicateLine('${line.id}')">${t("duplicate")}</button>
        <button class="btn btn-primary btn-sm" onclick="saveLine('${line.id}')">${t("save")}</button>
      </div>
    </div>
  </div>`;
      }

      function renderSingleProducedResource(resources, lineId) {
        if (resources.length === 0) {
          return "";
        }
        const r = resources[0];
        return `
    <div class="resource-row" data-index="0">
      <div class="autocomplete-wrapper">
        <input type="text" class="res-autocomplete" placeholder="${t("resourceName")}" value="${escHtml(r.name || "")}"
          maxlength="${MAX_RESOURCE_NAME_LENGTH}"
          oninput="updateResource('${lineId}', 'produces', 0, 'name', this.value); showAutocomplete(this, 'produces', '${lineId}', 0)"
          onfocus="showAutocomplete(this, 'produces', '${lineId}', 0)"
          onblur="setTimeout(() => hideAutocomplete(this), 200)">
        <div class="autocomplete-dropdown" id="autocomplete-produces-${lineId}-0"></div>
      </div>
      <span class="res-sep">x</span>
      <input type="number" placeholder="0" value="${r.qty || ""}" min="0" step="1"
        oninput="this.value = sanitizeWholeNumberInput(this.value); updateResource('${lineId}', 'produces', 0, 'qty', this.value)">
      <span class="res-unit">${t("perHour")}</span>
      <span class="res-sep">@</span>
      <input type="number" class="res-price" placeholder="$" value="${r.price || ""}" min="0" step="0.01"
        oninput="updateResource('${lineId}', 'produces', 0, 'price', this.value)">
      <button class="btn-remove-res" onclick="removeResource('${lineId}', 'produces', 0)">x</button>
    </div>`;
      }

      function renderResourceRows(resources, type, lineId) {
        const showPrice = type === "consumes";
        return resources
          .map(
            (r, i) => `
    <div class="resource-row" data-index="${i}">
      <div class="autocomplete-wrapper">
        <input type="text" class="res-autocomplete" placeholder="${t("resourceName")}" value="${escHtml(r.name || "")}"
          maxlength="${MAX_RESOURCE_NAME_LENGTH}"
          oninput="updateResource('${lineId}', '${type}', ${i}, 'name', this.value); showAutocomplete(this, '${type}', '${lineId}', ${i})"
          onfocus="showAutocomplete(this, '${type}', '${lineId}', ${i})"
          onblur="setTimeout(() => hideAutocomplete(this), 200)">
        <div class="autocomplete-dropdown" id="autocomplete-${type}-${lineId}-${i}"></div>
      </div>
      <span class="res-sep">x</span>
      <input type="number" placeholder="0" value="${r.qty || ""}" min="0" step="1"
        oninput="this.value = sanitizeWholeNumberInput(this.value); updateResource('${lineId}', '${type}', ${i}, 'qty', this.value)">
      <span class="res-unit">${t("perHour")}</span>
      ${
        showPrice
          ? `<span class="res-sep">@</span>
      <input type="number" class="res-price" placeholder="$" value="${r.price || ""}" min="0" step="0.01"
        oninput="updateResource('${lineId}', '${type}', ${i}, 'price', this.value)">`
          : ""
      }
      <button class="btn-remove-res" onclick="removeResource('${lineId}', '${type}', ${i})">x</button>
    </div>`,
          )
          .join("");
      }

      // ============================================================
      // AUTOCOMPLETE
      // ============================================================
      function showAutocomplete(input, type, lineId, index) {
        const dropdown = input.parentElement.querySelector(
          ".autocomplete-dropdown",
        );
        if (!dropdown) return;

        const value = input.value.toLowerCase().trim();
        const allNames = getAutocompleteResources(type);
        const filtered = value
          ? allNames.filter((item) => item.name.toLowerCase().includes(value))
          : allNames;

        if (filtered.length === 0) {
          dropdown.classList.remove("open");
          return;
        }

        dropdown.innerHTML = filtered
          .map(
            (item) =>
              `<div class="autocomplete-item" data-name="${escHtml(item.name)}" data-price="${item.price ?? ""}" onpointerdown="selectAutocompleteByEvent(event, '${lineId}', '${type}', ${index})" onclick="selectAutocompleteByEvent(event, '${lineId}', '${type}', ${index})">${escHtml(item.name)}${item.price ? ` <span style="color:var(--text-dimmer);font-size:11px">($${fmt(item.price)})</span>` : ""}</div>`,
          )
          .join("");
        dropdown.classList.add("open");
      }

      function hideAutocomplete(input) {
        const dropdown = input.parentElement.querySelector(
          ".autocomplete-dropdown",
        );
        if (dropdown) dropdown.classList.remove("open");
      }

      function selectAutocomplete(item, lineId, type, index) {
        const wrapper = item.closest(".autocomplete-wrapper");
        if (!wrapper) return;
        const input = wrapper.querySelector("input");
        if (!input) return;
        const name = item.dataset.name || "";
        const price = item.dataset.price || "";
        input.value = name;
        updateResource(lineId, type, index, "name", name);
        const row = item.closest(".resource-row");
        const priceInput = row ? row.querySelector(".res-price") : null;
        if (priceInput && price !== "") {
          priceInput.value = price;
          updateResource(lineId, type, index, "price", price);
        }
        hideAutocomplete(input);
      }

      function selectAutocompleteByEvent(event, lineId, type, index) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        const item = event?.currentTarget;
        if (!item) return;
        selectAutocomplete(item, lineId, type, index);
      }

      function bindLineEvents(id) {
        const card = document.getElementById(`card-${id}`);
        if (!card) return;
        card.querySelectorAll("input[data-field]").forEach((input) => {
          input.addEventListener("input", () => {
            const line = lines.find((l) => l.id === id);
            if (line) {
              line[input.dataset.field] =
                input.dataset.field === "name"
                  ? trimLineName(input.value)
                  : input.value;
              if (input.dataset.field === "name") input.value = line.name;
              markLineDirty(id, true);
              validateLine(id);
              refreshResults(id);
            }
          });
        });
      }

      function refreshResults(id) {
        // Re-render just results + badge without full render
        const line = lines.find((l) => l.id === id);
        if (!line) return;
        const card = document.getElementById(`card-${id}`);
        if (!card) return;

        // Update badge
        const { hoursPerWeek } = calcLine(line);
        const badge = card.querySelector(".line-badge");
        if (hoursPerWeek > 0) {
          if (badge) {
            badge.textContent = `${fmt(hoursPerWeek)}${t("hoursBadge")}`;
            badge.className = "line-badge active";
          } else {
            const chevron = card.querySelector(".chevron");
            const badgeEl = document.createElement("span");
            badgeEl.className = "line-badge active";
            badgeEl.textContent = `${fmt(hoursPerWeek)}${t("hoursBadge")}`;
            card
              .querySelector(".line-card-header")
              .insertBefore(badgeEl, chevron);
          }
        } else if (badge) {
          badge.remove();
        }

        updateHoursWarning(line.id);
        updateRecap();
      }

      // ============================================================
      // TOGGLE
      // ============================================================
      function toggleCard(id) {
        if (expandedIds.has(id)) expandedIds.delete(id);
        else expandedIds.add(id);
        renderAll();
        // Re-expand
        if (expandedIds.has(id)) {
          setTimeout(() => {
            const card = document.getElementById(`card-${id}`);
            if (card)
              card.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }, 50);
        }
      }

      // ============================================================
      // RESOURCE MANAGEMENT
      // ============================================================
      function clamp(value, min, max) {
        const n = parseFloat(value);
        if (!Number.isFinite(n)) return "";
        return Math.min(max, Math.max(min, n));
      }

      function normalizeLine(line) {
        const safeLine = line && typeof line === "object" ? line : {};
        const rawConsumes = Array.isArray(safeLine.consumes)
          ? safeLine.consumes
          : [];
        const rawProduces = Array.isArray(safeLine.produces)
          ? safeLine.produces
          : [];
        return {
          id: safeLine.id || uid(),
          name: trimLineName(safeLine.name || ""),
          daysPerWeek: safeLine.daysPerWeek ?? "",
          hoursPerWeek: safeLine.hoursPerWeek ?? "",
          surplus: safeLine.surplus ?? "0",
          consumes: rawConsumes.slice(0, 200).map((r) => ({
            name: r.name || "",
            qty: r.qty ?? "",
            price: r.price ?? "",
          })),
          produces: rawProduces.slice(0, 1).map((r) => ({
            name: r.name || "",
            qty: r.qty ?? "",
            price: r.price ?? "",
          })),
        };
      }

      function sanitizeLine(line) {
        line.name = trimLineName(line.name);
        line.daysPerWeek =
          line.daysPerWeek === "" ? "" : clamp(line.daysPerWeek, 0, 7);
        line.hoursPerWeek =
          line.hoursPerWeek === "" ? "" : clamp(line.hoursPerWeek, 0, 168);
        line.surplus =
          line.surplus === "" ? "" : Math.max(0, parseFloat(line.surplus) || 0);

        const days = parseFloat(line.daysPerWeek);
        const hours = parseFloat(line.hoursPerWeek);
        if (Number.isFinite(days) && Number.isFinite(hours)) {
          const maxHoursFromDays = days * 24;
          if (hours > maxHoursFromDays) {
            line.hoursPerWeek = maxHoursFromDays;
          }
        }

        ["consumes", "produces"].forEach((type) => {
          line[type] = (line[type] || []).map((r) => ({
            name: trimResourceName((r.name || "").toString()),
            qty:
              r.qty === ""
                ? ""
                : Math.max(0, Math.floor(parseFloat(r.qty) || 0)),
            price:
              r.price === "" || r.price === undefined
                ? ""
                : Math.max(0, parseFloat(r.price) || 0),
          }));
        });
        line.produces = (line.produces || []).slice(0, 1);
      }

      function validateLine(lineId) {
        const line = lines.find((l) => l.id === lineId);
        if (!line) return true;
        let message = "";
        const days = parseFloat(line.daysPerWeek);
        const hours = parseFloat(line.hoursPerWeek);
        const surplus = parseFloat(line.surplus);

        if (
          line.daysPerWeek !== "" &&
          (!Number.isFinite(days) || days < 0 || days > 7)
        ) {
          message = t("invalidDaysRange");
        } else if (
          line.hoursPerWeek !== "" &&
          (!Number.isFinite(hours) || hours < 0 || hours > 168)
        ) {
          message = t("invalidHoursRange");
        } else if (
          Number.isFinite(days) &&
          Number.isFinite(hours) &&
          hours > days * 24
        ) {
          message = t("invalidHoursVsDays");
        } else if (
          line.surplus !== "" &&
          (!Number.isFinite(surplus) || surplus < 0)
        ) {
          message = t("invalidSurplus");
        }

        updateHoursWarning(lineId, message);
        return !message;
      }

      function updateHoursWarning(lineId, forcedMessage = "") {
        const el = document.getElementById(`hours-info-${lineId}`);
        if (!el) return;
        el.textContent = forcedMessage;
      }

      function updateResource(lineId, type, index, field, value) {
        const line = lines.find((l) => l.id === lineId);
        if (!line) return;
        if (!line[type]) line[type] = [];
        if (!line[type][index]) line[type][index] = {};
        if (field === "name") value = trimResourceName(value);
        line[type][index][field] = value;
        markLineDirty(lineId, true);
        sanitizeLine(line);
        refreshResults(lineId);
      }

      function addResource(lineId, type) {
        const line = lines.find((l) => l.id === lineId);
        if (!line) return;
        if (!line[type]) line[type] = [];
        // For produces, only allow 1 resource
        if (type === "produces" && line[type].length >= 1) return;
        line[type].push({ name: "", qty: "", price: "" });
        markLineDirty(lineId, true);
        // Re-render the card to update the button visibility for produces
        if (type === "produces") {
          renderAll();
        } else {
          const container = document.getElementById(`${type}-${lineId}`);
          if (container) {
            container.innerHTML = renderResourceRows(line[type], type, lineId);
          }
        }
      }

      function removeResource(lineId, type, index) {
        const line = lines.find((l) => l.id === lineId);
        if (!line || !line[type]) return;
        line[type].splice(index, 1);
        markLineDirty(lineId, true);
        // Re-render the card to update the button visibility for produces
        if (type === "produces") {
          renderAll();
        } else {
          const container = document.getElementById(`${type}-${lineId}`);
          if (container) {
            container.innerHTML = renderResourceRows(line[type], type, lineId);
          }
          refreshResults(lineId);
        }
      }

      // ============================================================
      // CRUD
      // ============================================================
      function saveLine(id) {
        const card = document.getElementById(`card-${id}`);
        if (!card) return;
        const line = lines.find((l) => l.id === id);
        if (!line) return;
        // Sync name from input
        const nameInput = card.querySelector('input[data-field="name"]');
        if (nameInput) line.name = trimLineName(nameInput.value);
        if (!validateLine(id)) {
          showToast(t("fixInputsFirst"));
          return;
        }
        sanitizeLine(line);
        saveLines(lines);
        markLineDirty(id, false);
        showToast(t("lineSaved"));
        expandedIds.add(id);
        renderAll();
      }

      function deleteLine(id) {
        if (!confirm(t("deleteConfirm"))) return;
        lines = lines.filter((l) => l.id !== id);
        expandedIds.delete(id);
        dirtyIds.delete(id);
        saveLines(lines);
        renderAll();
        showToast(t("lineDeleted"));
      }

      function duplicateLine(id) {
        const original = lines.find((l) => l.id === id);
        if (!original) return;

        const duplicate = {
          id: uid(),
          name: original.name + " (copy)",
          daysPerWeek: original.daysPerWeek,
          hoursPerWeek: original.hoursPerWeek,
          surplus: original.surplus,
          consumes: JSON.parse(JSON.stringify(original.consumes || [])),
          produces: JSON.parse(JSON.stringify(original.produces || [])),
        };

        sanitizeLine(duplicate);
        lines.push(duplicate);
        expandedIds.add(duplicate.id);
        saveLines(lines);
        renderAll();
        showToast(t("lineCreated"));

        setTimeout(() => {
          const card = document.getElementById(`card-${duplicate.id}`);
          if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 100);
      }

      // ============================================================
      // MODAL
      // ============================================================
      function openNewLineModal() {
        document.getElementById("new-line-name").value = "";
        populateRecipeOptions();
        document.getElementById("modal-new").classList.add("open");
        setTimeout(() => document.getElementById("new-line-name").focus(), 50);
      }

      function closeNewLineModal() {
        document.getElementById("modal-new").classList.remove("open");
      }

      function populateRecipeOptions() {
        const select = document.getElementById("new-line-recipe");
        if (!select) return;
        const options = RECIPE_DB.slice().sort((a, b) => {
          const aName = localizeName(a.produced.names);
          const bName = localizeName(b.produced.names);
          return aName.localeCompare(bName);
        });
        if (options.length === 0) {
          select.innerHTML = `<option value="" selected>${t("noRecipe")}</option>`;
          return;
        }
        select.innerHTML =
          `<option value="" selected>${t("none")}</option>` +
          options
            .map((recipe) => {
              const label = localizeName(recipe.produced.names);
              const consumedCount = recipe.consumes.length;
              const suffix = consumedCount > 0 ? ` (${consumedCount})` : "";
              return `<option value="${recipe.id}">${escHtml(label)}${suffix}</option>`;
            })
            .join("");
      }

      function applyRecipeToLine(line, recipeId) {
        const recipe = RECIPE_DB.find((r) => r.id === recipeId);
        if (!recipe) return;
        const localizedProduced = localizeName(recipe.produced.names);
        if (!line.name || line.name === t("newLineTitle")) {
          line.name = trimLineName(localizedProduced);
        }
        line.consumes = recipe.consumes.map((r) => ({
          name: trimResourceName(localizeName(r.names)),
          qty: r.qty || "",
          price: r.price === undefined ? "" : r.price,
        }));
        line.produces = [
          {
            name: trimResourceName(localizedProduced),
            qty: recipe.produced.qty || 1,
            price: "",
          },
        ];
      }

      function createLine() {
        const name =
          trimLineName(document.getElementById("new-line-name").value.trim()) ||
          t("newLineTitle");
        const recipeId = document.getElementById("new-line-recipe").value;
        const line = {
          id: uid(),
          name,
          daysPerWeek: "",
          hoursPerWeek: "",
          surplus: "0",
          consumes: [],
          produces: [],
        };
        if (recipeId) {
          applyRecipeToLine(line, recipeId);
        }
        lines.push(line);
        expandedIds.add(line.id);
        saveLines(lines);
        closeNewLineModal();
        renderAll();
        showToast(t("lineCreated"));
        setTimeout(() => {
          const card = document.getElementById(`card-${line.id}`);
          if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 100);
      }

      // Enter to confirm modal
      document
        .getElementById("new-line-name")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") createLine();
          if (e.key === "Escape") closeNewLineModal();
        });
      document
        .getElementById("new-line-name")
        .setAttribute("maxlength", String(MAX_LINE_NAME_LENGTH));

      document.getElementById("modal-new").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal-new"))
          closeNewLineModal();
      });

      window.addEventListener("beforeunload", (e) => {
        if (dirtyIds.size > 0) {
          e.preventDefault();
          e.returnValue = t("unsavedChanges");
        }
      });
      window.addEventListener("resize", () => setMobileTab(mobileTab));

      // ============================================================
      // DRAG AND DROP (PC + MOBILE)
      // ============================================================
      let dragState = null;

      function startLineDrag(event, lineId) {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        event.stopPropagation();

        const card = document.getElementById(`card-${lineId}`);
        const list = document.getElementById("lines-list");
        if (!card || !list) return;

        dragState = { lineId };
        card.classList.add("dragging");
        list.classList.add("dragging-active");
        try {
          event.target.setPointerCapture(event.pointerId);
        } catch {}

        document.addEventListener("pointermove", onLineDragMove);
        document.addEventListener("pointerup", endLineDrag);
        document.addEventListener("pointercancel", endLineDrag);
      }

      function onLineDragMove(event) {
        if (!dragState) return;
        const list = document.getElementById("lines-list");
        const draggingEl = document.getElementById(`card-${dragState.lineId}`);
        if (!list || !draggingEl) return;

        const element = document.elementFromPoint(event.clientX, event.clientY);
        const targetCard = element ? element.closest(".line-card") : null;
        if (!targetCard || targetCard.id === draggingEl.id) return;

        const targetRect = targetCard.getBoundingClientRect();
        const shouldInsertAfter =
          event.clientY > targetRect.top + targetRect.height / 2;
        if (shouldInsertAfter) {
          list.insertBefore(draggingEl, targetCard.nextSibling);
        } else {
          list.insertBefore(draggingEl, targetCard);
        }
      }

      function endLineDrag() {
        if (!dragState) return;

        const list = document.getElementById("lines-list");
        const draggingEl = document.getElementById(`card-${dragState.lineId}`);
        if (draggingEl) draggingEl.classList.remove("dragging");
        if (list) list.classList.remove("dragging-active");

        if (list) {
          const orderedIds = Array.from(
            list.querySelectorAll(".line-card"),
          ).map((el) => el.dataset.lineId);
          const orderIndex = new Map(
            orderedIds.map((id, index) => [id, index]),
          );
          lines.sort(
            (a, b) => (orderIndex.get(a.id) ?? 0) - (orderIndex.get(b.id) ?? 0),
          );
          saveLines(lines);
          renderAll();
        }

        dragState = null;
        document.removeEventListener("pointermove", onLineDragMove);
        document.removeEventListener("pointerup", endLineDrag);
        document.removeEventListener("pointercancel", endLineDrag);
      }

      // ============================================================
      // INIT
      // ============================================================
      async function initApp() {
        lines = (lines || []).map(normalizeLine);
        await loadResourceDb();
        updateLangButtons();
        applyTranslations();
        renderAll();
      }

      initApp();
    </script>
  </body>
</html>
